.inner { min-width:1200px; }

.bar-area { flex:1; position:relative; display:flex; align-items:center; }
.bar-area::before {

.bar {
  position:absolute;

  border-radius:6px;
  display:flex; align-items:center;
  padding:0 9px;
  font-size:10.5px; font-weight:600;
  color:#fff;

    {name:'Food Trucks Late Night 🚚',zhName:'深夜美食车',loc:'Wellness Lot',s:m(22,0),e:m(24,0),cat:'c-food',desc:'可用 Food Points 购买\n· Sister Liu\'s · Flat Drum · Bon Fritay · Yalla!'},
    {name:'Midnight Pizza 🍕',zhName:'午夜披萨',loc:'Chapel Quad',s:m(22,30),e:m(23,0),cat:'c-food',desc:'免费午夜披萨，有赠品'},
  ]},
];

const chart=document.getElementById('chart');
const popup=document.getElementById('popup');
const ph=document.getElementById('ph');
const pb=document.getElementById('pb');

// ET time
const now=new Date();
const etStr=now.toLocaleString('en-US',{timeZone:'America/New_York'});
const etDate=new Date(etStr);
const nowMin=etDate.getHours()*60+etDate.getMinutes();

// Time header
const hdr=document.createElement('div');
hdr.style.cssText='display:flex;border-bottom:2px solid #e8e8e8;position:sticky;top:0;z-index:20;background:#fafafa;';
const lc=document.createElement('div');
lc.style.cssText='width:260px;flex-shrink:0;padding:10px 14px;border-right:2px solid #e8e8e8;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#999;display:flex;align-items:center;';
lc.textContent='Activity / Location';
hdr.appendChild(lc);
const tks=document.createElement('div'); tks.style.cssText='flex:1;display:flex;';
const nowHour=Math.floor(nowMin/60);
HOURS.forEach((h,i)=>{
  const t=document.createElement('div');
  const hNum=i+10;
  const isNow=(hNum===nowHour)||(hNum===24&&nowHour===0);
  t.style.cssText=`flex:1;text-align:center;padding:10px 0;font-size:11px;font-weight:${isNow?800:700};color:${isNow?'#e03030':'#888'};border-right:1px solid #ebebeb;`;
  t.textContent=h; tks.appendChild(t);
});
hdr.appendChild(tks);
chart.appendChild(hdr);

// Sections
sections.forEach(sec=>{
  const sh=document.createElement('div');
  sh.style.cssText='padding:7px 16px;background:#f7f7f7;border-bottom:1px solid #eaeaea;border-top:2px solid #e0e0e0;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#777;';
  sh.classList.add('sec-hdr-el');
  sh.textContent=sec.label;
  chart.appendChild(sh);

  sec.rows.forEach(r=>{
    const row=document.createElement('div');
    const mainCatEarly=r.cat.split(' ')[0];
    row.style.cssText='display:flex;align-items:stretch;border-bottom:1px solid #f0f0f0;min-height:56px;transition:background .1s,opacity .18s;';
    row.dataset.cat=mainCatEarly;
    row.onmouseenter=()=>row.style.background='#fafbff';
    row.onmouseleave=()=>row.style.background='';

    // Label
    const lbl=document.createElement('div');
    lbl.style.cssText='width:260px;flex-shrink:0;padding:10px 14px;border-right:2px solid #e8e8e8;display:flex;flex-direction:column;justify-content:center;gap:2px;';
    const nm=document.createElement('div');
    nm.style.cssText='font-size:12px;font-weight:700;color:#1a1a1a;line-height:1.3;';
    nm.textContent=r.name;
    const zh=document.createElement('div');
    zh.style.cssText='font-size:11px;font-weight:600;color:#3d6fd4;line-height:1.2;';
    zh.textContent=r.zhName||'';
    const lo=document.createElement('div');
    lo.style.cssText='font-size:10px;font-weight:500;color:#888;display:flex;align-items:center;gap:3px;';
    lo.innerHTML='<span style="font-size:9px">📍</span>'+r.loc;
    lbl.appendChild(nm);
    if(r.zhName) lbl.appendChild(zh);
    lbl.appendChild(lo);
    row.appendChild(lbl);

    // Bar area
    const ba=document.createElement('div');
    ba.style.cssText='flex:1;position:relative;display:flex;align-items:center;';

    // grid
    const gl=document.createElement('div');
    gl.style.cssText='position:absolute;inset:0;pointer-events:none;background-image:repeating-linear-gradient(90deg,transparent,transparent calc(100%/14 - 1px),#f0f0f0 calc(100%/14 - 1px),#f0f0f0 calc(100%/14));';
    ba.appendChild(gl);

    // now line
    if(nowMin>=S&&nowMin<=E){
      const nl=document.createElement('div');
      nl.style.cssText=`position:absolute;left:${lft(nowMin)};top:0;bottom:0;width:2px;background:#e03030;z-index:15;pointer-events:none;`;
      const nlb=document.createElement('div');
      nlb.style.cssText='position:absolute;top:-18px;left:50%;transform:translateX(-50%);background:#e03030;color:#fff;font-size:8px;font-weight:800;letter-spacing:.08em;padding:1px 5px;border-radius:3px;white-space:nowrap;';
      nlb.textContent='NOW'; nl.appendChild(nlb); ba.appendChild(nl);
    }

    // bar
    const cats=r.cat.split(' ');
    const mainCat=mainCatEarly;
    const isMain=cats.includes('main-show');
    const bar=document.createElement('div');
    const dur=r.e-r.s;
    const bgColor=isMain?'linear-gradient(90deg,#c0336b,#8a3dbd)':(CMAP[mainCat]||'#888');
    const shadow=isMain?'box-shadow:0 2px 14px rgba(192,51,107,.35);':'';
    bar.style.cssText=`position:absolute;left:${lft(r.s)};width:${wd(r.s,r.e)};height:${isMain?36:30}px;border-radius:6px;cursor:pointer;transition:filter .15s,transform .15s,box-shadow .15s;z-index:2;background:${bgColor};${shadow}`;

    // Time label — sits on top of bar, white text, never clipped
    const fmt24=t=>{const h=Math.floor(t/60)%24,n=t%60;return (h<10?'0':'')+h+':'+(n<10?'0':'')+n;};
    const timeLabel=document.createElement('div');
    timeLabel.style.cssText=`position:absolute;left:${lft(r.s)};top:50%;transform:translateY(-50%);white-space:nowrap;pointer-events:none;z-index:3;font-size:10.5px;font-weight:700;color:#fff;padding:0 8px;line-height:1;text-shadow:0 1px 4px rgba(0,0,0,.5);`;
    timeLabel.textContent=fmt24(r.s)+' – '+fmt24(r.e);
    ba.appendChild(timeLabel);

    // Popup
    bar.addEventListener('mouseenter',ev=>{
      const color=CMAP[mainCat]||'#888';
      ph.innerHTML=`
        <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:${color};margin-bottom:4px">${CNAME[mainCat]||''}</div>
        <div style="font-size:15px;font-weight:800;color:#1a1a1a;line-height:1.3;margin-bottom:2px">${r.zhName||r.name}</div>
        <div style="font-size:11px;font-weight:500;color:#888;">${r.name}</div>`;
      pb.innerHTML='';

      // Time row
      const tr=document.createElement('div');
      tr.style.cssText='display:flex;align-items:flex-start;gap:8px;font-size:12px;padding:0;';
      tr.innerHTML=`<span style="font-size:14px;flex-shrink:0">⏰</span><div style="color:#333"><strong style="display:block;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#999;margin-bottom:2px">时间</strong>${fmt(r.s)} — ${fmt(r.e)} · ${Math.round((r.e-r.s)/60*10)/10}h</div>`;
      pb.appendChild(tr);

      // Location row
      const lr=document.createElement('div');
      lr.style.cssText='display:flex;align-items:flex-start;gap:8px;font-size:12px;';
      lr.innerHTML=`<span style="font-size:14px;flex-shrink:0">📍</span><div style="color:#333"><strong style="display:block;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#999;margin-bottom:2px">地点</strong>${r.loc}</div>`;
      pb.appendChild(lr);

      // Desc row
      if(r.desc){
        const dr=document.createElement('div');
        dr.style.cssText='display:flex;align-items:flex-start;gap:8px;font-size:12px;border-top:1px solid #f0f0f0;padding-top:7px;margin-top:2px;';
        dr.innerHTML=`<span style="font-size:14px;flex-shrink:0">ℹ️</span><div style="color:#333;line-height:1.6"><strong style="display:block;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#999;margin-bottom:2px">详情</strong>${r.desc.replace(/\n/g,'<br>')}</div>`;
        pb.appendChild(dr);
      }

      popup.classList.add('show');
    });

    bar.addEventListener('mousemove',ev=>{
      const x=ev.clientX+16, y=ev.clientY+16;
      popup.style.left=(x+310>window.innerWidth?ev.clientX-318:x)+'px';
      popup.style.top=(y+popup.offsetHeight>window.innerHeight?ev.clientY-popup.offsetHeight-8:y)+'px';
    });
    bar.addEventListener('mouseleave',()=>popup.classList.remove('show'));

    ba.appendChild(bar);
    row.appendChild(ba);
    chart.appendChild(row);
  });
});

// ── Slicer filter ──────────────────────────────────────
let activeCat = 'all';

function filterCat(cat) {
  activeCat = cat;

  // Update button states
  document.querySelectorAll('#slicer .leg').forEach(el => {
    el.classList.toggle('active', el.dataset.cat === cat);
  });

  // Show/hide rows
  document.querySelectorAll('#chart [data-cat]').forEach(el => {
    const match = cat === 'all' || el.dataset.cat === cat;
    el.style.display = match ? 'flex' : 'none';
  });

  // Show/hide section headers — hide if all rows in section hidden
  const shdrs = document.querySelectorAll('#chart .sec-hdr-el');
  shdrs.forEach(hdr => {
    let sibling = hdr.nextElementSibling;
    let hasVisible = false;
    while (sibling && !sibling.classList.contains('sec-hdr-el')) {
      if (sibling.dataset.cat && sibling.style.display !== 'none') hasVisible = true;
      sibling = sibling.nextElementSibling;
    }
    hdr.style.display = hasVisible ? '' : 'none';
  });
}

// Initialize — all active
filterCat('all');
</script>
